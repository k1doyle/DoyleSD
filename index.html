<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoyleSD</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f1e8;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      main {
        display: grid;
        justify-items: center;
        gap: 18px;
      }

      img {
        max-width: min(90vw, 700px);
        height: auto;
        display: block;
        animation: fadeIn 1.2s ease-out forwards;
        opacity: 0;
      }

      .counter {
        animation: fadeIn 1.6s ease-out forwards;
        opacity: 0;
        color: #4a433b;
        background: rgba(255, 255, 255, 0.65);
        padding: 10px 16px;
        border-radius: 999px;
        font-size: 1rem;
      }

      .counter strong {
        color: #1f1a14;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./DoyleSD_Icon.png" alt="DoyleSD logo" />
      <div class="counter">
        <strong id="visit-count">Loading...</strong>
      </div>
    </main>

    <script>
      const counterEl = document.getElementById("visit-count");

      fetch("https://api.counterapi.dev/v1/k1doyle-doylesd/homepage/up")
        .then((response) => response.json())
        .then((data) => {
          counterEl.textContent = `Visitor #${Number(data.count).toLocaleString()}`;
        })
        .catch(() => {
          counterEl.textContent = "Visitor count unavailable";
        });
    </script>
  </body>
</html>
