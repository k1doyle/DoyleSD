<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoyleSD</title>
    <style>
      /* 1. Setup the Canvas */
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f1e8;
        overflow: hidden; /* Prevents scrollbars during animation */
      }

      /* 2. Style the Image & Add Animation */
      img {
        max-width: min(90vw, 700px);
        height: auto;
        display: block;
        
        /* Animation Properties */
        animation: fadeIn 1.2s ease-out forwards;
        opacity: 0; /* Starts invisible */
      }

      /* 3. Define the Animation "Keyframes" */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px); /* Starts slightly lower */
        }
        to {
          opacity: 1;
          transform: translateY(0);    /* Ends at its natural position */
        }
      }
    </style>
  </head>
  <body>
    <img src="./DoyleSD_Icon.png" alt="DoyleSD logo" />
  </body>
</html>
